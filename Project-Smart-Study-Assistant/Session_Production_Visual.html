<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture, Production & Interview Prep - BIA Smart Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --dark-navy: #1A2332;
            --teal: #0D9488;
            --light-teal: #14B8A6;
            --bg: #F0FDFA;
        }

        body {
            background-color: var(--bg);
            color: var(--dark-navy);
        }

        .tab-active {
            border-bottom: 3px solid var(--teal);
            color: var(--teal);
        }

        .flow-node {
            transition: all 0.3s ease;
        }

        .flow-node:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
        }

        .flow-arrow {
            stroke: var(--teal);
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .data-packet {
            animation: flow 3s linear infinite;
        }

        @keyframes flow {
            0% { offset-distance: 0%; }
            100% { offset-distance: 100%; }
        }

        .checklist-item {
            border-left: 4px solid #E5E7EB;
            transition: all 0.2s ease;
        }

        .checklist-item.checked {
            border-left-color: var(--teal);
            background-color: rgba(13, 148, 136, 0.05);
        }

        .flashcard {
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
        }

        .flashcard-back {
            transform: rotateY(180deg);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--teal) 0%, var(--light-teal) 100%);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
        }

        .typing-effect {
            border-right: 2px solid var(--teal);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 49% { border-right-color: var(--teal); }
            50%, 100% { border-right-color: transparent; }
        }

        .tooltip-trigger {
            position: relative;
            cursor: help;
            border-bottom: 1px dotted var(--teal);
        }

        .tooltip {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tooltip-trigger:hover .tooltip {
            opacity: 1;
            pointer-events: auto;
        }

        .use-case-mapping {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .mapping-column {
            border-radius: 8px;
            padding: 1.5rem;
            background: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ========================
        // TAB 1: Data Flow Visualizer
        // ========================
        function DataFlowVisualizer() {
            const [isAnimating, setIsAnimating] = useState(false);
            const [selectedNode, setSelectedNode] = useState(null);
            const [hoveredNode, setHoveredNode] = useState(null);

            const flowNodes = [
                {
                    id: 'input',
                    label: 'User Query',
                    description: 'User input: "Explain gradient descent from my notes"',
                    file: 'N/A',
                    function: 'User input',
                    code: 'query = "Explain gradient descent from my notes"',
                    x: 50,
                    y: 50,
                    errors: []
                },
                {
                    id: 'router',
                    label: 'Router (Classify)',
                    description: 'Determine query type and intent',
                    file: 'router.py',
                    function: 'route_query()',
                    code: 'intent = classifier.predict(query)\nreturn QUERY_TYPES.get(intent)',
                    x: 50,
                    y: 150,
                    errors: ['Classification error', 'Invalid intent']
                },
                {
                    id: 'embeddings',
                    label: 'Embeddings (Vectorize)',
                    description: 'Convert query text to vector representation',
                    file: 'embeddings.py',
                    function: 'embed_query()',
                    code: 'embedding = embedding_model.encode(query)\nreturn embedding.toarray()',
                    x: 50,
                    y: 250,
                    errors: ['Model not loaded', 'Embedding dimension mismatch']
                },
                {
                    id: 'chromadb',
                    label: 'ChromaDB (Search)',
                    description: 'Query vector database for similar documents',
                    file: 'loader.py',
                    function: 'query_documents()',
                    code: 'results = chromadb.query(\n  query_embeddings=[embedding],\n  n_results=5\n)',
                    x: 50,
                    y: 350,
                    errors: ['DB connection failed', 'No similar docs found']
                },
                {
                    id: 'retriever',
                    label: 'Retriever (Get Chunks)',
                    description: 'Extract relevant text chunks from search results',
                    file: 'retriever.py',
                    function: 'retrieve_context()',
                    code: 'chunks = [doc["text"] for doc in results]\ncontext = "\\n\\n".join(chunks)',
                    x: 50,
                    y: 450,
                    errors: ['Empty chunks', 'Low relevance score']
                },
                {
                    id: 'prompt',
                    label: 'Prompt Template (Inject)',
                    description: 'Create prompt with context and query',
                    file: 'prompt_template.py',
                    function: 'format_prompt()',
                    code: 'final_prompt = TEMPLATE.format(\n  context=context,\n  query=query\n)',
                    x: 50,
                    y: 550,
                    errors: ['Template error', 'Missing variables']
                },
                {
                    id: 'llm',
                    label: 'LLM (Generate)',
                    description: 'Generate response using language model',
                    file: 'llm.py',
                    function: 'generate_response()',
                    code: 'response = llm.generate(\n  prompt=final_prompt,\n  temperature=0.7\n)',
                    x: 50,
                    y: 650,
                    errors: ['API timeout', 'Rate limit exceeded']
                },
                {
                    id: 'evaluator',
                    label: 'Evaluator (Critique)',
                    description: 'Evaluate response quality and refine if needed',
                    file: 'evaluator.py',
                    function: 'evaluate_response()',
                    code: 'score = evaluator.score(response, context)\nif score < 0.7:\n  response = refine(response)',
                    x: 50,
                    y: 750,
                    errors: ['Evaluation failed', 'Refinement loop']
                },
                {
                    id: 'output',
                    label: 'Response',
                    description: 'Final refined response to user',
                    file: 'N/A',
                    function: 'Output',
                    code: 'return final_response',
                    x: 50,
                    y: 850,
                    errors: []
                }
            ];

            const runQuery = () => {
                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 4000);
            };

            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <h2 className="text-2xl font-bold text-dark-navy">Data Flow Visualizer</h2>
                        <button
                            onClick={runQuery}
                            disabled={isAnimating}
                            className="px-6 py-2 bg-teal text-white rounded-lg hover:bg-light-teal disabled:opacity-50 transition"
                        >
                            {isAnimating ? '▶ Running...' : '▶ Run Query'}
                        </button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Flow Diagram */}
                        <div className="lg:col-span-2 bg-white rounded-lg p-6 border border-teal border-opacity-20">
                            <svg width="100%" height="900" viewBox="0 0 600 900" className="mb-4">
                                <defs>
                                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                        <polygon points="0 0, 10 3, 0 6" fill="#0D9488" />
                                    </marker>
                                </defs>

                                {/* Connection lines */}
                                {flowNodes.slice(0, -1).map((node, idx) => {
                                    const nextNode = flowNodes[idx + 1];
                                    return (
                                        <g key={`line-${idx}`}>
                                            <line
                                                x1="75"
                                                y1={node.y + 40}
                                                x2="75"
                                                y2={nextNode.y - 30}
                                                className="flow-arrow"
                                            />
                                        </g>
                                    );
                                })}

                                {/* Data packet animation */}
                                {isAnimating && (
                                    <circle
                                        cx="75"
                                        cy="100"
                                        r="8"
                                        fill="#0D9488"
                                        className="data-packet"
                                        style={{
                                            offsetPath: 'path("M 75 100 L 75 900")',
                                            offsetDistance: '0%'
                                        }}
                                    />
                                )}

                                {/* Nodes */}
                                {flowNodes.map((node) => (
                                    <g
                                        key={node.id}
                                        className="flow-node"
                                        onMouseEnter={() => setHoveredNode(node.id)}
                                        onMouseLeave={() => setHoveredNode(null)}
                                        onClick={() => setSelectedNode(selectedNode === node.id ? null : node.id)}
                                    >
                                        <rect
                                            x={node.x - 30}
                                            y={node.y - 20}
                                            width="180"
                                            height="40"
                                            rx="8"
                                            fill={selectedNode === node.id ? '#0D9488' : (hoveredNode === node.id ? '#14B8A6' : '#E0F2F1')}
                                            stroke="#0D9488"
                                            strokeWidth="2"
                                        />
                                        <text
                                            x={node.x + 60}
                                            y={node.y + 5}
                                            textAnchor="middle"
                                            fill={selectedNode === node.id ? 'white' : '#1A2332'}
                                            fontSize="12"
                                            fontWeight="500"
                                        >
                                            {node.label}
                                        </text>
                                    </g>
                                ))}
                            </svg>
                        </div>

                        {/* Details Panel */}
                        <div className="bg-white rounded-lg p-6 border border-teal border-opacity-20 h-fit sticky top-6">
                            <h3 className="font-bold text-teal mb-4">Step Details</h3>
                            {selectedNode ? (
                                (() => {
                                    const node = flowNodes.find(n => n.id === selectedNode);
                                    return (
                                        <div className="space-y-4 text-sm">
                                            <div>
                                                <p className="font-semibold text-dark-navy">{node.label}</p>
                                                <p className="text-gray-600 mt-1">{node.description}</p>
                                            </div>
                                            <div className="border-t pt-3">
                                                <p className="font-semibold text-dark-navy mb-1">File: <span className="text-teal">{node.file}</span></p>
                                                <p className="font-semibold text-dark-navy mb-1">Function: <code className="bg-gray-100 px-2 py-1 rounded text-xs">{node.function}</code></p>
                                            </div>
                                            <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                                <p className="font-semibold text-xs text-gray-700 mb-2">Code Pattern:</p>
                                                <code className="text-xs text-gray-800 block font-mono whitespace-pre-wrap">{node.code}</code>
                                            </div>
                                            {node.errors.length > 0 && (
                                                <div className="bg-red-50 p-3 rounded border-l-4 border-red-500">
                                                    <p className="font-semibold text-xs text-red-700 mb-2">⚠️ Potential Errors:</p>
                                                    <ul className="text-xs text-red-700 space-y-1">
                                                        {node.errors.map((err, idx) => (
                                                            <li key={idx}>• {err}</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()
                            ) : (
                                <p className="text-gray-500 text-sm">Click a node to see details</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ========================
        // TAB 2: Use Case Mapper
        // ========================
        function UseCaseMapper() {
            const [selectedUseCase, setSelectedUseCase] = useState('customer-support');

            const useCases = {
                'customer-support': {
                    name: 'Customer Support',
                    mappings: [
                        {
                            original: 'loader.py',
                            originalDesc: 'Loads student notes',
                            adapted: 'Loads product docs, FAQs, ticket history (PDF/CSV)',
                            status: 'customized'
                        },
                        {
                            original: 'tools.py',
                            originalDesc: 'study_guide(), search_notes()',
                            adapted: 'escalate_ticket(), check_order(), create_refund()',
                            status: 'customized'
                        },
                        {
                            original: 'router.py',
                            originalDesc: 'classification, explanation, quiz',
                            adapted: 'billing, technical, general, escalation',
                            status: 'customized'
                        },
                        {
                            original: 'retriever.py',
                            originalDesc: 'RAG on notes',
                            adapted: 'RAG on support docs, same architecture',
                            status: 'unchanged'
                        },
                        {
                            original: 'prompt_template.py',
                            originalDesc: 'Study assistant prompt',
                            adapted: '"You are a support agent with 24/7 availability..."',
                            status: 'customized'
                        }
                    ]
                },
                'legal-analyzer': {
                    name: 'Legal Document Analyzer',
                    mappings: [
                        {
                            original: 'loader.py',
                            originalDesc: 'Loads student notes',
                            adapted: 'Loads contracts, case law, precedents (PDF/DOCX)',
                            status: 'customized'
                        },
                        {
                            original: 'tools.py',
                            originalDesc: 'study_guide(), search_notes()',
                            adapted: 'flag_clause(), suggest_edit(), generate_summary()',
                            status: 'customized'
                        },
                        {
                            original: 'evaluator.py',
                            originalDesc: 'Quality check response',
                            adapted: 'Ensure legal accuracy, flag liability risks',
                            status: 'customized'
                        },
                        {
                            original: 'retriever.py',
                            originalDesc: 'RAG on notes',
                            adapted: 'RAG on legal docs, same RAG flow',
                            status: 'unchanged'
                        },
                        {
                            original: 'llm.py',
                            originalDesc: 'GPT generation',
                            adapted: 'Same LLM call with legal-specific system prompt',
                            status: 'unchanged'
                        }
                    ]
                },
                'company-wiki': {
                    name: 'Company Wiki Assistant',
                    mappings: [
                        {
                            original: 'loader.py',
                            originalDesc: 'Loads student notes',
                            adapted: 'Loads company docs, policies, wiki pages, Notion/Confluence exports',
                            status: 'customized'
                        },
                        {
                            original: 'embeddings.py',
                            originalDesc: 'Vectorize queries',
                            adapted: 'Same embedding model, works on any text',
                            status: 'unchanged'
                        },
                        {
                            original: 'router.py',
                            originalDesc: 'Classification by intent',
                            adapted: 'Route by department: HR, IT, Finance, General',
                            status: 'customized'
                        },
                        {
                            original: 'tools.py',
                            originalDesc: 'study_guide(), quiz()',
                            adapted: 'link_to_policy(), request_access(), notify_owner()',
                            status: 'customized'
                        },
                        {
                            original: 'retriever.py',
                            originalDesc: 'RAG on notes',
                            adapted: 'RAG architecture unchanged, retrieves company knowledge',
                            status: 'unchanged'
                        }
                    ]
                },
                'healthcare': {
                    name: 'Healthcare Patient Assistant',
                    mappings: [
                        {
                            original: 'loader.py',
                            originalDesc: 'Loads student notes',
                            adapted: 'Loads patient records, treatment history, medical guidelines (HIPAA-compliant)',
                            status: 'customized'
                        },
                        {
                            original: 'evaluator.py',
                            originalDesc: 'Quality check response',
                            adapted: 'Ensure medical accuracy, flag urgent conditions, require human review',
                            status: 'customized'
                        },
                        {
                            original: 'router.py',
                            originalDesc: 'Intent classification',
                            adapted: 'Triage: urgent, appointment, symptoms, medication, general',
                            status: 'customized'
                        },
                        {
                            original: 'tools.py',
                            originalDesc: 'study_guide(), search()',
                            adapted: 'schedule_appointment(), notify_doctor(), provide_wellness_tips()',
                            status: 'customized'
                        },
                        {
                            original: 'llm.py + prompt_template.py',
                            originalDesc: 'LLM generation',
                            adapted: 'Same LLM with strict medical-safety system prompt and disclaimers',
                            status: 'customized'
                        }
                    ]
                }
            };

            const currentCase = useCases[selectedUseCase];

            return (
                <div className="space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-dark-navy mb-4">Use Case Mapper</h2>
                        <p className="text-gray-600 mb-4">Same architecture, different domains. Select a use case to see how the Smart Study Assistant adapts.</p>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                            {Object.entries(useCases).map(([key, value]) => (
                                <button
                                    key={key}
                                    onClick={() => setSelectedUseCase(key)}
                                    className={`p-3 rounded-lg font-semibold transition ${
                                        selectedUseCase === key
                                            ? 'bg-teal text-white'
                                            : 'bg-white border border-teal border-opacity-30 text-dark-navy hover:bg-teal hover:bg-opacity-10'
                                    }`}
                                >
                                    {value.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="use-case-mapping">
                        <div className="mapping-column border-l-4 border-teal">
                            <h3 className="font-bold text-teal mb-4">Smart Study Assistant (Original)</h3>
                            <div className="space-y-3 text-sm">
                                {currentCase.mappings.map((mapping, idx) => (
                                    <div key={idx} className="p-3 bg-blue-50 rounded">
                                        <p className="font-semibold text-dark-navy">{mapping.original}</p>
                                        <p className="text-gray-600 text-xs mt-1">{mapping.originalDesc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="mapping-column border-l-4 border-light-teal">
                            <h3 className="font-bold text-light-teal mb-4">{currentCase.name}</h3>
                            <div className="space-y-3 text-sm">
                                {currentCase.mappings.map((mapping, idx) => (
                                    <div
                                        key={idx}
                                        className={`p-3 rounded transition ${
                                            mapping.status === 'unchanged'
                                                ? 'bg-green-50 border-l-2 border-green-500'
                                                : 'bg-orange-50 border-l-2 border-orange-500'
                                        }`}
                                    >
                                        <div className="flex items-start justify-between">
                                            <div>
                                                <p className="font-semibold text-dark-navy">{mapping.adapted}</p>
                                                <p className="text-xs text-gray-600 mt-1">
                                                    {mapping.status === 'unchanged' ? '✓ Reusable' : '⚙️ Customized'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="bg-teal bg-opacity-10 border border-teal border-opacity-30 p-4 rounded-lg">
                        <p className="text-sm font-semibold text-teal mb-2">💡 Key Insight</p>
                        <p className="text-sm text-dark-navy">
                            The core architecture (loader → embeddings → ChromaDB → retriever → LLM → evaluator) is <strong>domain-agnostic</strong>.
                            You're only changing: the data source, tool definitions, routing intents, and system prompts. This is what makes the
                            Smart Study Assistant a <strong>template</strong> for any RAG application.
                        </p>
                    </div>
                </div>
            );
        }

        // ========================
        // TAB 3: Production Checklist
        // ========================
        function ProductionChecklist() {
            const [checkedItems, setCheckedItems] = useState(new Set());

            const categories = {
                security: {
                    name: '🔒 Security',
                    icon: '🔒',
                    items: [
                        {
                            id: 'gitignore',
                            task: 'Add .gitignore and exclude .env files',
                            why: 'Prevents accidental exposure of API keys and secrets to version control',
                            difficulty: 'easy'
                        },
                        {
                            id: 'env-vars',
                            task: 'Use environment variables for all API keys',
                            why: 'Never hardcode secrets; environment variables are the standard for secure credential management',
                            difficulty: 'easy'
                        },
                        {
                            id: 'env-example',
                            task: 'Create .env.example with dummy values',
                            why: 'Documents what env vars are needed without exposing actual values',
                            difficulty: 'easy'
                        },
                        {
                            id: 'api-validation',
                            task: 'Validate and sanitize user inputs before API calls',
                            why: 'Prevents injection attacks and malformed requests that could crash your service',
                            difficulty: 'medium'
                        },
                        {
                            id: 'rate-limit',
                            task: 'Implement API rate limiting',
                            why: 'Protects against abuse and ensures fair resource usage',
                            difficulty: 'hard'
                        }
                    ]
                },
                error_handling: {
                    name: '⚠️ Error Handling',
                    icon: '⚠️',
                    items: [
                        {
                            id: 'try-except',
                            task: 'Wrap API calls in try/except blocks',
                            why: 'Catches network failures, timeouts, and API errors without crashing the app',
                            difficulty: 'easy'
                        },
                        {
                            id: 'logging',
                            task: 'Add comprehensive logging (info, warning, error levels)',
                            why: 'Logs help debug issues in production and understand user behavior',
                            difficulty: 'easy'
                        },
                        {
                            id: 'graceful-degradation',
                            task: 'Implement graceful degradation (fallback responses)',
                            why: 'If a component fails, return a helpful message instead of crashing',
                            difficulty: 'medium'
                        },
                        {
                            id: 'error-messages',
                            task: 'Return user-friendly error messages (not stack traces)',
                            why: 'Users should understand what went wrong; stack traces expose system internals',
                            difficulty: 'medium'
                        },
                        {
                            id: 'monitoring',
                            task: 'Set up error tracking (Sentry, DataDog, etc.)',
                            why: 'Automated alerts and dashboards notify you of production errors immediately',
                            difficulty: 'hard'
                        }
                    ]
                },
                performance: {
                    name: '⚡ Performance',
                    icon: '⚡',
                    items: [
                        {
                            id: 'caching',
                            task: 'Cache embedding and retrieval results',
                            why: 'Avoids redundant API calls; 80% of queries are similar variants',
                            difficulty: 'easy'
                        },
                        {
                            id: 'lazy-load',
                            task: 'Lazy load heavy models (embeddings, LLM) on first use',
                            why: 'Speeds up app startup; models load only when needed',
                            difficulty: 'medium'
                        },
                        {
                            id: 'batch-processing',
                            task: 'Batch similar requests for API calls',
                            why: 'Reduces API overhead and improves throughput for high-traffic scenarios',
                            difficulty: 'medium'
                        },
                        {
                            id: 'response-time',
                            task: 'Monitor and log response times for each component',
                            why: 'Identify bottlenecks (slow retriever? slow LLM?) and optimize',
                            difficulty: 'medium'
                        },
                        {
                            id: 'async-io',
                            task: 'Use async/await for I/O operations',
                            why: 'Non-blocking I/O allows your app to handle multiple requests concurrently',
                            difficulty: 'hard'
                        }
                    ]
                },
                code_quality: {
                    name: '📝 Code Quality',
                    icon: '📝',
                    items: [
                        {
                            id: 'requirements',
                            task: 'Maintain requirements.txt with pinned versions',
                            why: 'Ensures reproducible environments; prevents breaking changes from dependency updates',
                            difficulty: 'easy'
                        },
                        {
                            id: 'readme',
                            task: 'Write comprehensive README with setup instructions',
                            why: 'Others (and future you) can set up and run your project quickly',
                            difficulty: 'easy'
                        },
                        {
                            id: 'docstrings',
                            task: 'Add docstrings to all functions',
                            why: 'Documents what each function does; essential for maintainability',
                            difficulty: 'easy'
                        },
                        {
                            id: 'type-hints',
                            task: 'Use type hints (Python 3.6+)',
                            why: 'Helps catch bugs early with static type checking (mypy)',
                            difficulty: 'medium'
                        },
                        {
                            id: 'tests',
                            task: 'Write unit and integration tests',
                            why: 'Tests catch regressions and give confidence for refactoring',
                            difficulty: 'hard'
                        }
                    ]
                },
                deployment: {
                    name: '🚀 Deployment',
                    icon: '🚀',
                    items: [
                        {

                    </div>

                    <div className="bg-white rounded-lg p-6 border border-teal border-opacity-20">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-3">
                                <span className={`px-3 py-1 rounded-full text-sm font-semibold ${difficultyColor[currentQuestion.difficulty]}`}>
                                    {currentQuestion.difficulty}
                                </span>
                                <span className="px-3 py-1 bg-teal bg-opacity-20 text-teal rounded-full text-sm font-semibold">
                                    {currentQuestion.category}
                                </span>
                            </div>
                            <span className="text-sm font-semibold text-gray-600">
                                Question {currentIdx + 1} of {orderedQuestions.length}
                            </span>
                        </div>

                        <div
                            className="flashcard min-h-96 cursor-pointer"
                            onClick={() => setFlipped(!flipped)}
                        >
                            <div className={`flashcard-inner h-full ${flipped ? 'flipped' : ''}`}>
                                {/* Front */}
                                <div className="flashcard-front bg-gradient-to-br from-teal to-light-teal text-white p-8 rounded-lg flex items-center justify-center text-center min-h-96">
                                    <div>
                                        <p className="text-sm opacity-75 mb-4">QUESTION</p>
                                        <p className="text-xl font-semibold leading-relaxed">{currentQuestion.question}</p>
                                        <p className="text-sm opacity-75 mt-8">Click to reveal answer</p>
                                    </div>
                                </div>

                                {/* Back */}
                                <div className="flashcard-back bg-gray-50 p-8 rounded-lg overflow-auto min-h-96 border border-teal">
                                    <div className="prose prose-sm max-w-none">
                                        <div className="text-sm text-gray-700 whitespace-pre-wrap font-mono leading-relaxed">
                                            {currentQuestion.answer}
                                        </div>
                                    </div>
                                    <p className="text-xs text-gray-500 mt-6">Click to hide answer</p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-6 flex items-center justify-between">
                            <button
                                onClick={prevQuestion}
                                disabled={currentIdx === 0}
                                className="px-4 py-2 bg-white border border-teal text-teal rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-teal hover:text-white transition"
                            >
                                ← Previous
                            </button>

                            <div className="flex items-center gap-2">
                                {Array.from({ length: orderedQuestions.length }).map((_, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => {
                                            setCurrentIdx(idx);
                                            setFlipped(false);
                                        }}
                                        className={`w-3 h-3 rounded-full transition ${
                                            idx === currentIdx ? 'bg-teal w-8' : 'bg-gray-300'
                                        }`}
                                    />
                                ))}
                            </div>

                            <button
                                onClick={nextQuestion}
                                disabled={currentIdx === orderedQuestions.length - 1}
                                className="px-4 py-2 bg-teal text-white rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-light-teal transition"
                            >
                                Next →
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {['System Design', 'Technical Deep-Dive', 'Behavioral'].map((cat) => {
                            const count = orderedQuestions.filter(q => q.category === cat).length;
                            return (
                                <div key={cat} className="bg-white p-4 rounded-lg border border-teal border-opacity-20">
                                    <p className="font-semibold text-dark-navy text-sm">{cat}</p>
                                    <p className="text-2xl font-bold text-teal mt-2">{count}</p>
                                    <p className="text-xs text-gray-600 mt-1">questions</p>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ========================
        // Main App Component
        // ========================
        function App() {
            const [activeTab, setActiveTab] = useState('data-flow');

            const tabs = [
                { id: 'data-flow', label: '1. Data Flow Visualizer', icon: '🔄' },
                { id: 'use-case', label: '2. Use Case Mapper', icon: '🗺️' },
                { id: 'checklist', label: '3. Production Checklist', icon: '✅' },
                { id: 'interview', label: '4. Interview Simulator', icon: '🎤' }
            ];

            return (
                <div style={{ backgroundColor: 'var(--bg)' }} className="min-h-screen">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-dark-navy to-teal text-white py-8">
                        <div className="max-w-7xl mx-auto px-4">
                            <h1 className="text-4xl font-bold mb-2">Architecture, Production & Interview Prep</h1>
                            <p className="text-teal-100">BIA Smart Study Assistant – Beginner Level</p>
                        </div>
                    </div>

                    {/* Tab Navigation */}
                    <div className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex gap-8 overflow-x-auto">
                                {tabs.map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`py-4 px-2 font-semibold border-b-4 transition whitespace-nowrap ${
                                            activeTab === tab.id
                                                ? 'tab-active'
                                                : 'border-b-4 border-transparent text-gray-600 hover:text-dark-navy'
                                        }`}
                                    >
                                        {tab.icon} {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {activeTab === 'data-flow' && <DataFlowVisualizer />}
                        {activeTab === 'use-case' && <UseCaseMapper />}
                        {activeTab === 'checklist' && <ProductionChecklist />}
                        {activeTab === 'interview' && <InterviewSimulator />}
                    </div>

                    {/* Footer */}
                    <div className="bg-dark-navy text-white py-8 mt-16">
                        <div className="max-w-7xl mx-auto px-4 text-center text-sm text-gray-400">
                            <p>BIA GenAI Course | Smart Study Assistant Project</p>
                            <p className="mt-2">Created for learning architecture patterns, production best practices, and interview preparation</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
