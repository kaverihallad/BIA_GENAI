<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session 11: Vector DB Landscape Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #0d9488;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #14b8a6;
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ============= DATABASE COMPARISON DATA =============
    const databases = [
      {
        id: 'faiss',
        name: 'FAISS',
        description: 'Facebook AI Similarity Search',
        stats: {
          type: 'Library',
          persistence: 'In-memory (default)',
          metadataFilter: false,
          hybridSearch: false,
          pricing: 'Free',
          bestFor: 'Learning/Prototyping',
          maxScale: '~10M vectors',
          api: 'Python library',
        }
      },
      {
        id: 'chroma',
        name: 'Chroma',
        description: 'Open-source embedding database',
        stats: {
          type: 'Embedded DB',
          persistence: 'Persistent',
          metadataFilter: true,
          hybridSearch: false,
          pricing: 'Free/Open-source',
          bestFor: 'POC/Small apps',
          maxScale: '~1M vectors',
          api: 'Python, JavaScript',
        }
      },
      {
        id: 'weaviate',
        name: 'Weaviate',
        description: 'Vector database with GraphQL',
        stats: {
          type: 'Full DB Server',
          persistence: 'Persistent',
          metadataFilter: true,
          hybridSearch: true,
          pricing: 'Free OSS / $200-400/mo managed',
          bestFor: 'Hybrid search needs',
          maxScale: '~100M vectors',
          api: 'GraphQL, REST, gRPC',
        }
      },
      {
        id: 'pinecone',
        name: 'Pinecone',
        description: 'Managed serverless vector DB',
        stats: {
          type: 'Managed Serverless',
          persistence: 'Persistent',
          metadataFilter: true,
          hybridSearch: false,
          pricing: '$500-800/mo for 10M vectors',
          bestFor: 'Production at scale',
          maxScale: 'Billions of vectors',
          api: 'REST',
        }
      }
    ];

    const featureCategories = {
      'Basics': ['type', 'persistence', 'api'],
      'Features': ['metadataFilter', 'hybridSearch'],
      'Ops': ['pricing', 'bestFor', 'maxScale']
    };

    // ============= HYBRID SEARCH DATA =============
    const documents = [
      { id: 1, text: "Best beaches in Goa for a relaxing vacation", category: 'travel' },
      { id: 2, text: "How to book cheap flights to Delhi", category: 'travel' },
      { id: 3, text: "Top-rated luxury hotels in Mumbai", category: 'travel' },
      { id: 4, text: "Python pandas tutorial for data analysis", category: 'tech' },
      { id: 5, text: "Budget backpacking through Southeast Asia", category: 'travel' },
      { id: 6, text: "Machine learning algorithms explained simply", category: 'tech' },
      { id: 7, text: "Seaside resorts with swimming pools near Chennai", category: 'travel' },
      { id: 8, text: "JavaScript React framework comparison guide", category: 'tech' },
      { id: 9, text: "Adventure sports and trekking in Himalayas", category: 'travel' },
      { id: 10, text: "Affordable accommodation tips for solo travelers", category: 'travel' }
    ];

    const hybridSearchMap = {
      'beach': { keyword: [1, 7], semantic: [1, 5, 7, 9] },
      'travel': { keyword: [1, 2, 3, 5, 7, 9, 10], semantic: [1, 2, 3, 5, 7, 9, 10] },
      'cheap': { keyword: [2, 5, 10], semantic: [2, 5, 10] },
      'accommodation': { keyword: [3, 7, 10], semantic: [3, 5, 7, 10] },
      'adventure': { keyword: [9], semantic: [5, 9] },
      'data analysis': { keyword: [4], semantic: [4, 6, 8] },
      'learn programming': { keyword: [4, 6, 8], semantic: [4, 6, 8] },
      'mountain': { keyword: [9], semantic: [5, 9] },
    };

    // ============= DECISION HELPER QUESTIONS =============
    const decisionQuestions = [
      {
        id: 1,
        question: "What's your primary use case?",
        options: ['Learning/POC', 'Production app', 'Enterprise'],
      },
      {
        id: 2,
        question: "How many documents do you need to store?",
        options: ['<10K', '10K-1M', '1M-100M', '100M+'],
      },
      {
        id: 3,
        question: "Do you need hybrid search (keyword + semantic)?",
        options: ['Yes', 'No', 'Maybe later'],
      },
      {
        id: 4,
        question: "Infrastructure preference?",
        options: ['No servers (embedded)', 'I can run Docker', 'Fully managed cloud'],
      },
      {
        id: 5,
        question: "Budget constraint?",
        options: ['Free only', '<$500/month', 'Flexible'],
      }
    ];

    const getRecommendation = (answers) => {
      const { 0: useCase, 1: scale, 2: hybrid, 3: infra, 4: budget } = answers;

      if (useCase === 'Learning/POC') {
        if (scale === '<10K' || scale === '10K-1M') {
          return {
            db: 'Chroma',
            confidence: 'Highly Recommended',
            reasons: [
              'Perfect for prototyping and POCs',
              'Free and open-source',
              'Easy to set up locally',
              'Simple Python/JS API'
            ]
          };
        }
      }

      if (useCase === 'Production app') {
        if (hybrid === 'Yes') {
          return {
            db: 'Weaviate',
            confidence: 'Recommended',
            reasons: [
              'Native hybrid search (BM25 + vector)',
              'GraphQL API for flexibility',
              'Self-hosted or managed options',
              'Scales to 100M+ vectors'
            ]
          };
        }
        if (infra === 'Fully managed cloud' || budget === 'Flexible') {
          return {
            db: 'Pinecone',
            confidence: 'Recommended',
            reasons: [
              'Fully managed serverless solution',
              'No infrastructure management needed',
              'Scales to billions of vectors',
              'Enterprise-grade reliability'
            ]
          };
        }
        if (infra === 'I can run Docker') {
          return {
            db: 'Weaviate',
            confidence: 'Recommended',
            reasons: [
              'Docker-friendly deployment',
              'Open-source self-hosted option',
              'Full control over infrastructure',
              'Production-ready'
            ]
          };
        }
      }

      if (useCase === 'Enterprise') {
        return {
          db: 'Pinecone',
          confidence: 'Strongly Recommended',
          reasons: [
            'Enterprise-grade SLAs and support',
            'Fully managed and monitored',
            'Scales to billions of vectors',
            'Advanced security and compliance features'
          ]
        };
      }

      return {
        db: 'Chroma',
        confidence: 'Default recommendation',
        reasons: ['Good starting point for exploration']
      };
    };

    // ============= TAB 1: DB COMPARISON =============
    function DBComparisonTab() {
      const [selectedDB, setSelectedDB] = useState(null);
      const [activeCategory, setActiveCategory] = useState('Basics');

      const categoryOptions = Object.keys(featureCategories);
      const features = featureCategories[activeCategory];

      const renderValue = (value) => {
        if (typeof value === 'boolean') {
          return value ? (
            <span className="text-green-400 font-bold">✓</span>
          ) : (
            <span className="text-red-400 font-bold">✗</span>
          );
        }
        return <span className="text-gray-300">{value}</span>;
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-wrap gap-2">
            {categoryOptions.map(cat => (
              <button
                key={cat}
                onClick={() => setActiveCategory(cat)}
                className={`px-4 py-2 rounded-lg font-semibold transition-all ${
                  activeCategory === cat
                    ? 'bg-teal-600 text-white'
                    : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                }`}
              >
                {cat}
              </button>
            ))}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {databases.map(db => (
              <div
                key={db.id}
                onClick={() => setSelectedDB(selectedDB === db.id ? null : db.id)}
                className={`rounded-lg p-5 cursor-pointer transition-all duration-300 ${
                  selectedDB === db.id
                    ? 'bg-teal-600 ring-2 ring-teal-400 shadow-lg'
                    : 'bg-gray-800 hover:bg-gray-750 border border-gray-700'
                }`}
              >
                <h3 className="text-xl font-bold mb-1">{db.name}</h3>
                <p className="text-gray-300 text-sm mb-4">{db.description}</p>

                <div className="space-y-3">
                  {features.map(feature => (
                    <div key={feature} className="flex justify-between items-center">
                      <span className="text-gray-400 text-sm">
                        {feature.replace(/([A-Z])/g, ' $1').trim()}:
                      </span>
                      <div>{renderValue(db.stats[feature])}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {selectedDB && (
            <div className="bg-gray-800 rounded-lg p-6 border-l-4 border-teal-500">
              <h3 className="text-lg font-bold mb-4">
                {databases.find(d => d.id === selectedDB)?.name} - Full Details
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {Object.entries(databases.find(d => d.id === selectedDB)?.stats || {}).map(
                  ([key, value]) => (
                    <div key={key}>
                      <p className="text-gray-400 text-sm">
                        {key.replace(/([A-Z])/g, ' $1').trim()}
                      </p>
                      <p className="text-teal-400 font-semibold">{renderValue(value)}</p>
                    </div>
                  )
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============= TAB 2: HYBRID SEARCH DEMO =============
    function HybridSearchTab() {
      const [query, setQuery] = useState('beach');
      const [results, setResults] = useState(hybridSearchMap['beach'] || { keyword: [], semantic: [] });

      const handleQueryChange = (e) => {
        const q = e.target.value.toLowerCase();
        setQuery(q);
        if (hybridSearchMap[q]) {
          setResults(hybridSearchMap[q]);
        } else {
          setResults({ keyword: [], semantic: [] });
        }
      };

      const keywordResults = results.keyword || [];
      const semanticResults = results.semantic || [];
      const hybridResults = Array.from(new Set([...keywordResults, ...semanticResults]));
      const keywordOnly = keywordResults.filter(id => !semanticResults.includes(id));
      const semanticOnly = semanticResults.filter(id => !keywordResults.includes(id));
      const both = keywordResults.filter(id => semanticResults.includes(id));

      return (
        <div className="space-y-6">
          <div>
            <label className="block text-sm font-semibold mb-2">Search Query</label>
            <input
              type="text"
              value={query}
              onChange={handleQueryChange}
              placeholder="Try: beach, travel, adventure, learn programming..."
              className="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500 focus:ring-opacity-20"
            />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Keyword Search Results */}
            <div className="bg-gray-800 rounded-lg p-4 border border-blue-500 border-opacity-30">
              <h3 className="font-bold mb-3 flex items-center">
                <span className="w-3 h-3 bg-blue-500 rounded-full mr-2"></span>
                Keyword Search (BM25)
              </h3>
              <p className="text-xs text-gray-400 mb-3">Matches exact words</p>
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {keywordResults.length === 0 ? (
                  <p className="text-gray-500 text-sm">No results</p>
                ) : (
                  keywordResults.map(id => (
                    <div key={id} className="bg-blue-900 bg-opacity-30 p-2 rounded text-sm">
                      {documents.find(d => d.id === id)?.text}
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* Semantic Search Results */}
            <div className="bg-gray-800 rounded-lg p-4 border border-green-500 border-opacity-30">
              <h3 className="font-bold mb-3 flex items-center">
                <span className="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                Semantic Search (Vector)
              </h3>
              <p className="text-xs text-gray-400 mb-3">Matches by meaning</p>
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {semanticResults.length === 0 ? (
                  <p className="text-gray-500 text-sm">No results</p>
                ) : (
                  semanticResults.map(id => (
                    <div key={id} className="bg-green-900 bg-opacity-30 p-2 rounded text-sm">
                      {documents.find(d => d.id === id)?.text}
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* Hybrid Results */}
            <div className="bg-gray-800 rounded-lg p-4 border border-yellow-500 border-opacity-30">
              <h3 className="font-bold mb-3 flex items-center">
                <span className="w-3 h-3 bg-yellow-500 rounded-full mr-2"></span>
                Hybrid (RRF Fusion)
              </h3>
              <p className="text-xs text-gray-400 mb-3">Combined ranking</p>
              <div className="space-y-2 max-h-96 overflow-y-auto">
                {hybridResults.length === 0 ? (
                  <p className="text-gray-500 text-sm">No results</p>
                ) : (
                  hybridResults.map(id => {
                    const inKeyword = keywordResults.includes(id);
                    const inSemantic = semanticResults.includes(id);
                    let bgColor = 'bg-gray-700';
                    if (inKeyword && inSemantic) {
                      bgColor = 'bg-yellow-900 bg-opacity-50';
                    } else if (inKeyword) {
                      bgColor = 'bg-blue-900 bg-opacity-30';
                    } else if (inSemantic) {
                      bgColor = 'bg-green-900 bg-opacity-30';
                    }
                    return (
                      <div key={id} className={`${bgColor} p-2 rounded text-sm`}>
                        {documents.find(d => d.id === id)?.text}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>

          <div className="bg-gray-800 rounded-lg p-4">
            <h3 className="font-bold mb-3">Search Breakdown</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
              <div className="bg-blue-900 bg-opacity-20 rounded p-3">
                <p className="text-blue-400 font-semibold">{keywordOnly.length}</p>
                <p className="text-xs text-gray-400">Keyword-only</p>
              </div>
              <div className="bg-yellow-900 bg-opacity-20 rounded p-3">
                <p className="text-yellow-400 font-semibold">{both.length}</p>
                <p className="text-xs text-gray-400">In both results</p>
              </div>
              <div className="bg-green-900 bg-opacity-20 rounded p-3">
                <p className="text-green-400 font-semibold">{semanticOnly.length}</p>
                <p className="text-xs text-gray-400">Semantic-only</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============= TAB 3: MIGRATION SIMULATOR =============
    function MigrationSimulatorTab() {
      const [step, setStep] = useState(0);

      const steps = [
        {
          title: 'Source Database: FAISS',
          description: 'Original vectors stored in memory',
          visual: 'FAISS',
          icons: ['🗂️', '📊', '⚡'],
        },
        {
          title: 'Export Step',
          description: 'Extract vectors and metadata',
          visual: 'EXPORT',
          icons: ['↗️', '📤', '🔄'],
        },
        {
          title: 'Transform & Prepare',
          description: 'Validate format, add metadata, re-embed if needed',
          visual: 'TRANSFORM',
          icons: ['🔧', '✨', '📋'],
        },
        {
          title: 'Load into Target DB',
          description: 'Ingest into Chroma/Weaviate',
          visual: 'LOAD',
          icons: ['📥', '🎯', '✅'],
        },
        {
          title: 'Verification',
          description: 'Run same query on both DBs, compare results',
          visual: 'VERIFY',
          icons: ['🔍', '✓', '✓'],
        },
      ];

      const currentStep = steps[step];

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center mb-6">
            <h3 className="text-lg font-bold">Migration: FAISS → Chroma</h3>
            <span className="bg-teal-600 px-3 py-1 rounded-full text-sm">
              Step {step + 1} of {steps.length}
            </span>
          </div>

          {/* Progress Bar */}
          <div className="h-2 bg-gray-700 rounded-full overflow-hidden">
            <div
              className="h-full bg-teal-500 transition-all duration-500"
              style={{ width: `${((step + 1) / steps.length) * 100}%` }}
            ></div>
          </div>

          {/* Step Display */}
          <div className="bg-gray-800 rounded-lg p-8 text-center min-h-48 flex flex-col justify-center">
            <div className="flex justify-center gap-4 mb-6 text-5xl">
              {currentStep.icons.map((icon, i) => (
                <span key={i} className="animate-bounce" style={{ animationDelay: `${i * 0.1}s` }}>
                  {icon}
                </span>
              ))}
            </div>
            <h2 className="text-2xl font-bold mb-2">{currentStep.title}</h2>
            <p className="text-gray-400 mb-4">{currentStep.description}</p>
            <div className="inline-block bg-teal-600 bg-opacity-20 border border-teal-500 rounded px-4 py-2 font-mono text-sm">
              {currentStep.visual}
            </div>
          </div>

          {/* Step Details */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-gray-800 rounded p-4">
              <p className="text-xs text-gray-500 uppercase font-bold mb-1">Status</p>
              <p className="text-teal-400 font-semibold">
                {step === 0 && '🟡 Preparing'}
                {step === 1 && '🟡 Exporting'}
                {step === 2 && '🟡 Transforming'}
                {step === 3 && '🟡 Loading'}
                {step === 4 && '🟢 Complete'}
              </p>
            </div>
            <div className="bg-gray-800 rounded p-4">
              <p className="text-xs text-gray-500 uppercase font-bold mb-1">Data Integrity</p>
              <p className="text-green-400 font-semibold">
                {step >= 2 && '✓ Validated'}
                {step < 2 && '⏳ Pending'}
              </p>
            </div>
            <div className="bg-gray-800 rounded p-4">
              <p className="text-xs text-gray-500 uppercase font-bold mb-1">Documents</p>
              <p className="text-blue-400 font-semibold">
                {step === 0 && '1,234 in source'}
                {step === 1 && '1,234 exported'}
                {step === 2 && '1,234 transformed'}
                {step === 3 && '1,234 loaded'}
                {step === 4 && '1,234 verified'}
              </p>
            </div>
          </div>

          {/* Navigation */}
          <div className="flex justify-between">
            <button
              onClick={() => setStep(Math.max(0, step - 1))}
              disabled={step === 0}
              className="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
              ← Previous
            </button>
            <button
              onClick={() => setStep(Math.min(steps.length - 1, step + 1))}
              disabled={step === steps.length - 1}
              className="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
              Next →
            </button>
          </div>

          {/* Info Box */}
          <div className="bg-teal-900 bg-opacity-30 border border-teal-600 border-opacity-50 rounded-lg p-4">
            <p className="text-sm text-teal-200">
              <span className="font-bold">💡 Tip:</span> This simulates a real migration workflow. In production, you'd use tools like Langchain, LlamaIndex, or native export/import features.
            </p>
          </div>
        </div>
      );
    }

    // ============= TAB 4: DECISION HELPER =============
    function DecisionHelperTab() {
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [showRecommendation, setShowRecommendation] = useState(false);

      const handleAnswer = (answer) => {
        const newAnswers = [...answers];
        newAnswers[currentQuestion] = answer;
        setAnswers(newAnswers);

        if (currentQuestion === decisionQuestions.length - 1) {
          setShowRecommendation(true);
        } else {
          setCurrentQuestion(currentQuestion + 1);
        }
      };

      const handleReset = () => {
        setCurrentQuestion(0);
        setAnswers([]);
        setShowRecommendation(false);
      };

      const handleBack = () => {
        if (currentQuestion > 0) {
          setCurrentQuestion(currentQuestion - 1);
          setShowRecommendation(false);
        }
      };

      if (showRecommendation) {
        const recommendation = getRecommendation(answers);
        return (
          <div className="space-y-6">
            <div className="bg-gradient-to-r from-teal-600 to-teal-700 rounded-lg p-8 text-center">
              <p className="text-gray-200 mb-2">Recommended Database</p>
              <h2 className="text-4xl font-bold mb-2">{recommendation.db}</h2>
              <p className="text-teal-200 font-semibold">{recommendation.confidence}</p>
            </div>

            <div className="grid grid-cols-1 gap-3">
              {recommendation.reasons.map((reason, i) => (
                <div key={i} className="bg-gray-800 rounded-lg p-4 flex items-start gap-3">
                  <span className="text-teal-400 font-bold text-lg flex-shrink-0">✓</span>
                  <p className="text-gray-200">{reason}</p>
                </div>
              ))}
            </div>

            <div className="bg-gray-800 rounded-lg p-4">
              <h3 className="font-bold mb-3">Your Answers</h3>
              <div className="space-y-2">
                {decisionQuestions.map((q, i) => (
                  <div key={q.id} className="flex justify-between text-sm">
                    <span className="text-gray-400">{q.question}</span>
                    <span className="text-teal-400 font-semibold">{answers[i]}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex gap-3">
              <button
                onClick={handleReset}
                className="flex-1 px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-700 font-semibold transition-all"
              >
                Start Over
              </button>
              <button
                onClick={handleBack}
                className="flex-1 px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition-all"
              >
                Change Answers
              </button>
            </div>
          </div>
        );
      }

      const question = decisionQuestions[currentQuestion];
      const progress = ((currentQuestion) / decisionQuestions.length) * 100;

      return (
        <div className="space-y-6">
          <div>
            <div className="flex justify-between items-center mb-2">
              <span className="text-sm text-gray-400">
                Question {currentQuestion + 1} of {decisionQuestions.length}
              </span>
              <span className="text-sm font-semibold text-teal-400">{Math.round(progress)}%</span>
            </div>
            <div className="h-2 bg-gray-700 rounded-full overflow-hidden">
              <div
                className="h-full bg-teal-500 transition-all duration-500"
                style={{ width: `${progress}%` }}
              ></div>
            </div>
          </div>

          <div className="bg-gray-800 rounded-lg p-6 text-center min-h-24 flex items-center justify-center">
            <h2 className="text-2xl font-bold">{question.question}</h2>
          </div>

          <div className="grid grid-cols-1 gap-3">
            {question.options.map(option => (
              <button
                key={option}
                onClick={() => handleAnswer(option)}
                className="p-4 rounded-lg bg-gray-800 hover:bg-teal-600 border border-gray-700 hover:border-teal-500 text-left transition-all duration-200 hover:scale-102"
              >
                <span className="font-semibold">{option}</span>
              </button>
            ))}
          </div>

          <div className="flex gap-3">
            <button
              onClick={handleBack}
              disabled={currentQuestion === 0}
              className="flex-1 px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
              ← Back
            </button>
            {answers[currentQuestion] && (
              <div className="flex-1 text-center flex items-center justify-center">
                <span className="text-teal-400 font-semibold">✓ {answers[currentQuestion]}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============= MAIN APP =============
    function App() {
      const [activeTab, setActiveTab] = useState('comparison');

      const tabs = [
        { id: 'comparison', label: 'DB Comparison', icon: '📊' },
        { id: 'hybrid', label: 'Hybrid Search', icon: '🔀' },
        { id: 'migration', label: 'Migration', icon: '↔️' },
        { id: 'decision', label: 'Decision Helper', icon: '🎯' },
      ];

      return (
        <div className="min-h-screen bg-gray-900 text-white">
          {/* Header */}
          <header className="bg-gradient-to-r from-gray-800 to-gray-900 border-b border-teal-600 border-opacity-30">
            <div className="max-w-7xl mx-auto px-6 py-8">
              <h1 className="text-4xl font-bold mb-2">Vector Database Landscape Explorer</h1>
              <p className="text-gray-400">Session 11: Interactive Exploration Tool</p>
            </div>
          </header>

          {/* Navigation Tabs */}
          <div className="bg-gray-800 sticky top-0 z-40 border-b border-gray-700">
            <div className="max-w-7xl mx-auto px-6">
              <div className="flex gap-1 overflow-x-auto">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-4 font-semibold whitespace-nowrap transition-all border-b-2 ${
                      activeTab === tab.id
                        ? 'border-teal-500 text-teal-400'
                        : 'border-transparent text-gray-400 hover:text-white'
                    }`}
                  >
                    <span className="mr-2">{tab.icon}</span>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Content */}
          <main className="max-w-7xl mx-auto px-6 py-8">
            {activeTab === 'comparison' && <DBComparisonTab />}
            {activeTab === 'hybrid' && <HybridSearchTab />}
            {activeTab === 'migration' && <MigrationSimulatorTab />}
            {activeTab === 'decision' && <DecisionHelperTab />}
          </main>

          {/* Footer */}
          <footer className="bg-gray-800 border-t border-gray-700 mt-12">
            <div className="max-w-7xl mx-auto px-6 py-6 text-center text-gray-500 text-sm">
              <p>Vector DB Landscape Explorer | Built with React 18 + Tailwind CSS</p>
            </div>
          </footer>
        </div>
      );
    }

    // ============= RENDER =============
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
